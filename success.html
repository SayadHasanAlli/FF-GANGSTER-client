<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Registration Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: #111827;
      padding: 30px 20px;
      border-radius: 15px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    .checkmark {
      font-size: 55px;
      color: #ff9900;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #ff9101;
      color: black;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #c87201;
    }

    .small {
      margin-top: 15px;
      font-size: 12px;
      color: #6b7280;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 🔥 Mobile Optimization */
    @media (max-width: 400px) {
      .container {
        padding: 25px 15px;
      }

      h1 {
        font-size: 18px;
      }

      p {
        font-size: 13px;
      }

      .btn {
        font-size: 14px;
        padding: 10px;
      }

      .checkmark {
        font-size: 45px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="checkmark">✔</div>

    <h1>Registration Successful!</h1>

    <p>
      Your team has been successfully registered for the tournament.<br>
      Please wait for admin approval.
    </p>

    <a href="/" class="btn">Go to Home</a>

    <div class="small">
      Redirecting automatically with in 5 second...
    </div>
  </div>

  <script>
    // Auto redirect after 5 sec
    setTimeout(() => {
      window.location.href = "/";
    }, 5000);
  </script>

</body>
</html>
