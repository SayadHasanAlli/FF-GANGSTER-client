<!DOCTYPE html>
<html>
<head>
  <title>FF Gangster Admin</title>

  <style>
    body { font-family: Arial; background:#111; color:white; }

    h2 { text-align:center; }

    /* Tabs */
    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      cursor: pointer;
      background: #333;
      color: white;
      border-radius: 5px;
    }

    .active {
      background: orange;
      color: black;
    }

    #container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 10px;
    }

    .card {
      background:#222;
      padding:15px;
      border-radius:10px;
    }

    button {
      padding:8px;
      margin:5px;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    .approve { background:green; color:white; }
    .delete { background:red; color:white; }

    ul { padding-left:20px; }
    li { margin:4px 0; list-style:"🎮 "; }

    @media (max-width:1024px){
      #container { grid-template-columns:repeat(2,1fr); }
    }

    @media (max-width:600px){
      #container { grid-template-columns:repeat(1,1fr); }
    }

    .heading{
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status{
      color: orange;
      font-size: 12px;
    }

    .approved {
      color: lightgreen !important;
    }
  </style>
</head>

<body>

<h2>🧑‍💻 BattleGang Admin Panel</h2>

<div class="tabs">
  <button class="tab-btn active" onclick="showTeams(event)">Teams</button>
  <button class="tab-btn" onclick="showSolo(event)">Solo</button>
  <button class="tab-btn" onclick="showReviews(event)">Reviews</button>
</div>

<div id="container">Loading...</div>

<script>

const API = "https://ff-gangster.onrender.com/api";

let currentTab = "teams";

// ================= TAB SWITCH =================
function setActive(btn){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// ================= TEAMS =================
async function showTeams(e){
  currentTab = "teams";
  if(e) setActive(e.target);

  const container = document.getElementById("container");
  container.innerHTML = "Loading...";

  const res = await fetch(`${API}/teams`);
  const data = await res.json();

  renderTeamCards(data);
}

function renderTeamCards(data){
  const container = document.getElementById("container");
  container.innerHTML = "";

data.forEach(t => {
  container.innerHTML += `
    <div class="card" id="${t._id}" style="padding:12px;margin-bottom:10px;border-radius:10px;background:#1c1c1c;color:white;">
      
      <div style="display:flex;justify-content:space-between;align-items:center;">
        
        <h3 style="margin:0;">${t.team}</h3>

        <span 
          style="
            padding:4px 10px;
            border-radius:6px;
            font-size:12px;
            ${t.status === "approved" 
              ? "color:#28a745;" 
              : "background:#ff9800;color:white;"}
          ">
          ${t.status}
        </span>

      </div>

      <!-- Players -->
      <div style="margin-top:8px;">
        ${t.players.map((p, i) => `
          <p style="
            margin:4px 0;
            padding:5px 8px;
            border-radius:6px;
            background:rgba(255,255,255,0.05);
            font-weight:600;
          ">
            Player ${i === 0 ? "👑" : i + 1}: ${p}
          </p>
        `).join("")}
      </div>

      <!-- Payment Info -->
      <p style="margin-top:8px;">📱 WhatsApp: ${t.wpnum}</p>
      <p>👤 Payment Person: ${t.payer}</p>
      <p>💳 UPI: ${t.upi}</p>
      <p>🧾 UTR: ${t.utr}</p>
      <p>📅 Time: ${new Date(t.createdAt).toLocaleString()}</p>

      ${t.status !== "approved" ? 
        `<button 
          style="margin-top:6px;padding:6px 10px;border:none;border-radius:6px;background:#28a745;color:white;cursor:pointer;"
          onclick="approve('${t._id}','team')">
          Approve
        </button>` : ""}

      <button 
        style="margin-top:6px;margin-left:6px;padding:6px 10px;border:none;border-radius:6px;background:#dc3545;color:white;cursor:pointer;"
        onclick="del('${t._id}','team')">
        Delete
      </button>

    </div>
  `;
});
}

// ================= SOLO =================
async function showSolo(e){
  currentTab = "solo";
  if(e) setActive(e.target);

  const container = document.getElementById("container");
  container.innerHTML = "Loading...";

  const res = await fetch(`${API}/solo`);
  const data = await res.json();

  renderSoloCards(data);
}

function renderSoloCards(data){
  const container = document.getElementById("container");
  container.innerHTML = "";

  data.forEach(t => {
  container.innerHTML += `
    <div class="card" id="${t._id}">
      
      <div class="heading" style="display:flex;justify-content:space-between;align-items:center;">
        
        <h3 style="margin:0;">Player Names</h3>

        <span 
          class="status ${t.status === "approved" ? "approved" : ""}" 
          style="
            padding:4px 10px;
            border-radius:6px;
            font-size:12px;
          ">
          ${t.status}
        </span>
      </div>

      <div style="margin-top:8px;">
        ${t.players.map((p, i) => `
          <p style="
            margin:4px 0;
            padding:5px 8px;
            border-radius:6px;
            background:rgba(255,255,255,0.05);
            font-weight:600;
          ">
            Player ${i + 1}: ${p}
          </p>
        `).join("")}
      </div>

      <p>📱 WhatsApp: ${t.wpnum}</p>
      <p>👤 Payment Person: ${t.payer}</p>
      <p>💳 UPI: ${t.upi}</p>
      <p>🧾 UTR: ${t.utr}</p>
      <p>🎁 Refer: ${t.refer || "None"}</p>
      <p>📅 Time: ${new Date(t.createdAt).toLocaleString()}</p>

      ${t.status !== "approved" ? 
        `<button class="approve" onclick="approve('${t._id}','solo')">Approve</button>` : ""}

      <button class="delete" onclick="del('${t._id}','solo')">Delete</button>
    </div>
  `;
});
}

// ================= REVIEWS =================
async function showReviews(e){
  currentTab = "reviews";
  if(e) setActive(e.target);

  const container = document.getElementById("container");
  container.innerHTML = "Loading...";

  const res = await fetch(`${API}/reviews-all`);
  const data = await res.json();

  container.innerHTML = "";

  data.forEach(r => {
    container.innerHTML += `
      <div class="card" id="${r._id}">
        <div class="heading">
          <h3>${r.name}</h3>
          <span class="status ${r.approved ? "approved" : ""}">
            ${r.approved ? "approved" : "pending"}
          </span>
        </div>

        <p>${"⭐".repeat(r.rating)}</p>
        <p>${r.message}</p>

        ${!r.approved ? 
          `<button class="approve" onclick="approveReview('${r._id}')">Approve</button>` : ""}

        <button class="delete" onclick="deleteReview('${r._id}')">Delete</button>
      </div>
    `;
  });
}

// ================= ACTIONS =================

// APPROVE TEAM / SOLO
async function approve(id, type){
  const url = type === "team"
    ? `${API}/approve/${id}`
    : `${API}/solo/approve/${id}`;

  await fetch(url, { method:"PUT" });

  // 🔥 FULL UI UPDATE
  const card = document.getElementById(id);

  if(card){
    const status = card.querySelector(".status");
    status.innerText = "approved";
    status.classList.add("approved");

    const btn = card.querySelector(".approve");
    if(btn) btn.remove();
  }
}

// DELETE TEAM / SOLO
async function del(id, type){
  if(!confirm("Delete this?")) return;

  const url = type === "team"
    ? `${API}/delete/${id}`
    : `${API}/solo/delete/${id}`;

  await fetch(url, { method:"DELETE" });

  document.getElementById(id).remove();
}

// REVIEW APPROVE
async function approveReview(id){
  await fetch(`${API}/review/approve/${id}`, { method:"PUT" });

  const card = document.getElementById(id);

  if(card){
    const status = card.querySelector(".status");
    status.innerText = "approved";
    status.classList.add("approved");

    const btn = card.querySelector(".approve");
    if(btn) btn.remove();
  }
}

// REVIEW DELETE
async function deleteReview(id){
  if(!confirm("Delete this review?")) return;

  await fetch(`${API}/review/delete/${id}`, { method:"DELETE" });

  document.getElementById(id).remove();
}

// default load
showTeams();

</script>

</body>
</html>
