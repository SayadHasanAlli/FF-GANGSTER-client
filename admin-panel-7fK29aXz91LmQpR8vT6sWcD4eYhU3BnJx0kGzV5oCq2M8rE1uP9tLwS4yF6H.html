<!DOCTYPE html>
<html>
<head>
  <title>FF Gangster Admin</title>

  <style>
    body { font-family: Arial; background:#111; color:white; }

    h2 { text-align:center; }

    /* Tabs */
    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      cursor: pointer;
      background: #333;
      color: white;
      border-radius: 5px;
    }

    .active {
      background: orange;
      color: black;
    }

    #container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 10px;
    }

    .card {
      background:#222;
      padding:15px;
      border-radius:10px;
    }

    button {
      padding:8px;
      margin:5px;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    .approve { background:green; color:white; }
    .delete { background:red; color:white; }

    ul { padding-left:20px; }
    li { margin:4px 0; list-style:"🎮 "; }

    @media (max-width:1024px){
      #container { grid-template-columns:repeat(2,1fr); }
    }

    @media (max-width:600px){
      #container { grid-template-columns:repeat(1,1fr); }
    }

    .heading{
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status{
      color: orange;
      font-size: 12px;
    }

    .approved {
      color: lightgreen !important;
    }
  </style>
</head>

<body>

<h2>🧑‍💻 FF Gangster Admin Panel</h2>

<div class="tabs">
  <button class="tab-btn active" onclick="showTeams(event)">Teams</button>
  <button class="tab-btn" onclick="showSolo(event)">Solo</button>
  <button class="tab-btn" onclick="showReviews(event)">Reviews</button>
</div>

<div id="container">Loading...</div>

<script>

const API = "https://ff-gangster.onrender.com/api";

let currentTab = "teams";

// ================= TAB SWITCH =================
function setActive(btn){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// ================= TEAMS =================
async function showTeams(e){
  currentTab = "teams";
  if(e) setActive(e.target);

  const container = document.getElementById("container");
  container.innerHTML = "Loading...";

  const res = await fetch(`${API}/teams`);
  const data = await res.json();

  renderTeamCards(data);
}

function renderTeamCards(data){
  const container = document.getElementById("container");
  container.innerHTML = "";

  data.forEach(t => {
    container.innerHTML += `
      <div class="card" id="${t._id}">
        <div class="heading">
          <h3>${t.team}</h3>
          <span class="status ${t.status === "approved" ? "approved" : ""}">
            ${t.status}
          </span>
        </div>

        <ul>
          ${t.players.map(p => `<li>${p}</li>`).join("")}
        </ul>

        <p>📱 ${t.wpnum}</p>

        ${t.status !== "approved" ? 
          `<button class="approve" onclick="approve('${t._id}','team')">Approve</button>` : ""}

        <button class="delete" onclick="del('${t._id}','team')">Delete</button>
      </div>
    `;
  });
}

// ================= SOLO =================
async function showSolo(e){
  currentTab = "solo";
  if(e) setActive(e.target);

  const container = document.getElementById("container");
  container.innerHTML = "Loading...";

  const res = await fetch(`${API}/solo`);
  const data = await res.json();

  renderSoloCards(data);
}

function renderSoloCards(data){
  const container = document.getElementById("container");
  container.innerHTML = "";

  data.forEach(t => {
    container.innerHTML += `
      <div class="card" id="${t._id}">
        <div class="heading">
          <h3>${t.players[0]}</h3>
          <span class="status ${t.status === "approved" ? "approved" : ""}">
            ${t.status}
          </span>
        </div>

        <ul>
          ${t.players.map(p => `<li>${p}</li>`).join("")}
        </ul>

        ${t.status !== "approved" ? 
          `<button class="approve" onclick="approve('${t._id}','solo')">Approve</button>` : ""}

        <button class="delete" onclick="del('${t._id}','solo')">Delete</button>
      </div>
    `;
  });
}

// ================= REVIEWS =================
async function showReviews(e){
  currentTab = "reviews";
  if(e) setActive(e.target);

  const container = document.getElementById("container");
  container.innerHTML = "Loading...";

  const res = await fetch(`${API}/reviews-all`);
  const data = await res.json();

  container.innerHTML = "";

  data.forEach(r => {
    container.innerHTML += `
      <div class="card" id="${r._id}">
        <div class="heading">
          <h3>${r.name}</h3>
          <span class="status ${r.approved ? "approved" : ""}">
            ${r.approved ? "approved" : "pending"}
          </span>
        </div>

        <p>${"⭐".repeat(r.rating)}</p>
        <p>${r.message}</p>

        ${!r.approved ? 
          `<button class="approve" onclick="approveReview('${r._id}')">Approve</button>` : ""}

        <button class="delete" onclick="deleteReview('${r._id}')">Delete</button>
      </div>
    `;
  });
}

// ================= ACTIONS =================

// APPROVE TEAM / SOLO
async function approve(id, type){
  const url = type === "team"
    ? `${API}/approve/${id}`
    : `${API}/solo/approve/${id}`;

  await fetch(url, { method:"PUT" });

  // 🔥 FULL UI UPDATE
  const card = document.getElementById(id);

  if(card){
    const status = card.querySelector(".status");
    status.innerText = "approved";
    status.classList.add("approved");

    const btn = card.querySelector(".approve");
    if(btn) btn.remove();
  }
}

// DELETE TEAM / SOLO
async function del(id, type){
  if(!confirm("Delete this?")) return;

  const url = type === "team"
    ? `${API}/delete/${id}`
    : `${API}/solo/delete/${id}`;

  await fetch(url, { method:"DELETE" });

  document.getElementById(id).remove();
}

// REVIEW APPROVE
async function approveReview(id){
  await fetch(`${API}/review/approve/${id}`, { method:"PUT" });

  const card = document.getElementById(id);

  if(card){
    const status = card.querySelector(".status");
    status.innerText = "approved";
    status.classList.add("approved");

    const btn = card.querySelector(".approve");
    if(btn) btn.remove();
  }
}

// REVIEW DELETE
async function deleteReview(id){
  if(!confirm("Delete this review?")) return;

  await fetch(`${API}/review/delete/${id}`, { method:"DELETE" });

  document.getElementById(id).remove();
}

// default load
showTeams();

</script>

</body>
</html>
